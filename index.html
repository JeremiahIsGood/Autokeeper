<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f766e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="计车器">
    <title>计车器</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/car-icon-192.png">
    <link rel="apple-touch-icon" href="icons/car-icon-192.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>计车器</h1>
          <p id="statusText">选择地区后点击品牌记录</p>
        </div>
        <div class="top-actions">
          <button class="icon-button chart-button" id="rankPageButton" type="button" aria-label="排行榜" title="排行榜">
            <span></span><span></span><span></span>
          </button>
          <button class="icon-button" id="undoButton" type="button" aria-label="撤销上一次记录" title="撤销上一次记录">↶</button>
        </div>
      </header>

      <main id="recordPage">
        <section class="region-strip" aria-label="地区选择">
          <button class="region-picker-button" id="regionPickerButton" type="button">
            <span>当前地区</span>
            <strong id="regionPickerText">广东省 · 广州市 · 天河区</strong>
          </button>
        </section>

        <section class="today-bar" aria-live="polite">
          <span>当前地区</span>
          <strong id="currentRegion">广州</strong>
          <span>今日记录</span>
          <strong id="todayCount">0</strong>
        </section>

        <section class="brand-search" aria-label="品牌搜索">
          <input id="brandSearchInput" type="search" placeholder="搜索品牌并定位">
          <button id="brandSearchButton" type="button">定位</button>
        </section>

        <section class="brand-groups" id="brandGrid" aria-label="汽车品牌记录按钮"></section>
      </main>

      <main id="rankPage" hidden>
        <section class="page-head">
          <button class="text-button muted-button" id="backToRecordButton" type="button">返回记录</button>
          <h2 id="rankTitle">排行榜</h2>
        </section>

        <section class="rank-filters" aria-label="排行榜筛选">
          <button class="region-picker-button" id="rankRegionButton" type="button">
            <span>排行榜基准地区</span>
            <strong id="rankRegionText">广东省 · 广州市 · 天河区</strong>
          </button>
          <div class="scope-tabs" aria-label="地区范围">
            <button class="tab is-active" type="button" data-rank-scope="district">区县</button>
            <button class="tab" type="button" data-rank-scope="city">城市</button>
            <button class="tab" type="button" data-rank-scope="province">省级</button>
            <button class="tab" type="button" data-rank-scope="all">全部</button>
          </div>
          <div class="tabs rank-tabs" aria-label="统计范围">
            <button class="tab is-active" type="button" data-rank-range="today">今日</button>
            <button class="tab" type="button" data-rank-range="week">本周</button>
            <button class="tab" type="button" data-rank-range="month">月份</button>
            <button class="tab" type="button" data-rank-range="year">年份</button>
            <button class="tab" type="button" data-rank-range="all">全部</button>
          </div>
          <div class="rank-selects">
            <select id="rankMonthSelect" hidden></select>
            <select id="rankYearSelect" hidden></select>
          </div>
        </section>

        <section class="rank-panel" aria-label="排行榜">
          <ol class="rank-list" id="rankList"></ol>
          <div class="backup-actions rank-backup-actions">
            <button class="text-button" id="importButton" type="button">导入</button>
            <button class="text-button" id="exportButton" type="button">导出</button>
            <input id="importInput" type="file" accept="application/json,.json" hidden>
          </div>
        </section>
      </main>
    </div>

    <div class="modal-backdrop" id="brandMenu" hidden>
      <section class="modal-sheet" role="dialog" aria-modal="true" aria-labelledby="menuTitle">
        <h2 id="menuTitle">品牌</h2>
        <button class="menu-action" id="menuViewButton" type="button">查看记录</button>
        <button class="menu-action" id="menuSortButton" type="button">调整本组排序</button>
        <button class="menu-action danger" id="menuMinusButton" type="button">减一</button>
        <button class="menu-action muted" id="menuCloseButton" type="button">取消</button>
      </section>
    </div>

    <div class="modal-backdrop" id="recordDialog" hidden>
      <section class="modal-sheet large" role="dialog" aria-modal="true" aria-labelledby="recordTitle">
        <div class="modal-head">
          <h2 id="recordTitle">记录</h2>
          <button class="small-close" id="recordCloseButton" type="button" aria-label="关闭">×</button>
        </div>
        <ol class="record-list" id="recordList"></ol>
      </section>
    </div>

    <div class="modal-backdrop" id="sortDialog" hidden>
      <section class="modal-sheet large" role="dialog" aria-modal="true" aria-labelledby="sortTitle">
        <div class="modal-head">
          <h2 id="sortTitle">调整排序</h2>
          <button class="small-close" id="sortCloseButton" type="button" aria-label="关闭">×</button>
        </div>
        <ol class="sort-list" id="sortList"></ol>
        <button class="menu-action" id="sortSaveButton" type="button">保存排序</button>
      </section>
    </div>

    <div class="modal-backdrop" id="regionDialog" hidden>
      <section class="modal-sheet large" role="dialog" aria-modal="true" aria-labelledby="regionTitle">
        <div class="modal-head">
          <h2 id="regionTitle">选择地区</h2>
          <button class="small-close" id="regionCloseButton" type="button" aria-label="关闭">×</button>
        </div>
        <input class="search-input" id="regionSearchInput" type="search" placeholder="搜索城市、区县">
        <div class="region-path">
          <button id="regionBackButton" type="button">返回</button>
          <span id="regionPathText">请选择省级地区</span>
        </div>
        <div class="region-list" id="regionList" aria-label="地区列表"></div>
        <div class="search-results" id="regionSearchResults" hidden></div>
      </section>
    </div>

    <script src="regions.js"></script>
    <script src="app.js"></script>
  </body>
</html>
